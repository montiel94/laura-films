<section class="plans-section" id="planes">
  <div class="plans-header">
    <div>
      <h2 class="section-title">ELIGE TU<br><span class="accent">PLAN</span></h2>
    </div>
  </div>

  <!-- Cards grid -->
  <div class="plans-grid">
    @for (plan of plans; track plan.name) {
      <div class="plan-card" [class.featured]="plan.featured">
        <div class="plan-name">{{ plan.name }}</div>
        <div class="plan-tagline">{{ plan.tagline }}</div>
        <ul class="plan-features">
          @for (feature of plan.features; track feature) {
            <li class="plan-feature">{{ feature }}</li>
          }
        </ul>
        <a class="plan-cta" [href]="wspUrl" target="_blank" rel="noopener">
          Contratar plan
        </a>
      </div>
    }
  </div>
