<section class="testimonios-section" id="testimonios">
  <h2 class="section-title">CLIENTES QUE<br><span class="accent">CONFÍAN</span></h2>

  <div class="carousel-wrap"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)">
    <div class="carousel-track" [style.transform]="'translateX(-' + currentIndex * 100 + '%)'">
      @for (t of testimonials; track t.name) {
        <div class="carousel-slide">
          <div class="test-card">
            <div class="test-stars">
              <span class="test-star">★</span>
              <span class="test-star">★</span>
              <span class="test-star">★</span>
              <span class="test-star">★</span>
              <span class="test-star">★</span>
            </div>
            <p class="test-quote">{{ t.quote }}</p>
            <div class="test-divider"></div>
            <div class="test-author">
              <div class="test-avatar">{{ t.initials }}</div>
              <div>
                <div class="test-name">{{ t.name }}</div>
                <div class="test-role">{{ t.role }}</div>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="carousel-controls">
    <button class="carousel-btn" (click)="prev()" aria-label="Anterior">&#8592;</button>
    <div class="carousel-dots">
      @for (t of testimonials; track t.name; let i = $index) {
        <button
          class="c-dot"
          [class.active]="i === currentIndex"
          (click)="goTo(i)"
          [attr.aria-label]="'Ir al testimonio ' + (i + 1)"
        ></button>
      }
    </div>
    <button class="carousel-btn" (click)="next()" aria-label="Siguiente">&#8594;</button>
  </div>
</section>
